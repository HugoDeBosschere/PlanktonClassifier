#This config is used to test several values 

program: main.py
name: chad  
project: WinningKaggle
entity: hugo-debosschere-are-na
count: 132
method: bayes 
metric:
  goal: maximize
  name: f1score


parameters:
  
  data.trainpath:
    value: '$TMPDIR/dataset/train'
  data.testpath:
    value: '$TMPDIR/dataset/test'
  data.batch_size:
    value: 256
  data.num_workers:
    value: 16
  data.valid_ratio:
    value: 0.2
  data.is_batch_weighted:
    value: False #If True, The dataloader are initialized with a RandomWeightedSampler

  
  optim.algo:
    value : AdamW
  optim.params.lr:
      distribution: log_uniform_values
      max: 0.001 
      min : 0.00001
  optim.params.weight_decay:
      distribution: log_uniform_values
      max: 0.01 
      min : 0.0001
  optim.params.amsgrad:
    values: [True, False]
  optim.clip_value: 
    value: 1.0

    
  loss.lossname:
    value: "CrossEntropyLoss"
  loss.is_weighted:
    values: [False,True]
  loss.is_article_weighted:
    values: [True,False] 
  
  scheduler.name: 
    value: "cosineannealing"

  scheduler.lr_decay:
    distribution: uniform
    max: 1.0 
    min : 0.97

  train.nepochs: 
    value: 10
  train.test_end_train:
    value: False

  
  logging.logdir:
    value: ${JOB_WORKSPACE}/logs # Better to provide the fullpath, especially on the cluster
  logging.save_dir:
    value: ${JOB_WORKSPACE}/logs 


  
  model.class:
    value: PlanktonClassifier
  model.pretrained_path:
    values: ['mobilenetv2_100','mobilenetv2_140','efficientnet_b3.ra2_in1k']
  model.pretrained_in_color:
    value: True 
  model.freeze_pretrained:
    value: False
